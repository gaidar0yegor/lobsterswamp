<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobster Swamp 🦞</title>
  <meta name="description" content="LodsterSwamp — Lobster + Yegor. AI-human engineering collective.">
  <link rel="stylesheet" href="css/ambient.css">
  <!-- Three.js r128 (particle background; allowed by CSP script-src cdnjs.cloudflare.com) -->
  <script id="three-js-cdn" src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:monospace;background:#0a0a0a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrap{text-align:center;padding:2rem;position:relative;z-index:1}
    h1{font-size:2.5rem;margin-bottom:0.5rem;letter-spacing:-1px}
    p{color:#888;margin-bottom:2rem;font-size:1rem}
    a.btn{display:inline-block;padding:0.75rem 2rem;background:#fff;color:#000;text-decoration:none;font-weight:bold;font-family:monospace;letter-spacing:1px;transition:opacity 0.2s}
    a.btn:hover{opacity:0.8}
    .sub{margin-top:2rem;font-size:0.75rem;color:#444}
  </style>
</head>
<body>
  <canvas id="scene-bg" aria-hidden="true"></canvas>

  <div class="wrap">
    <h1>🦞 Lobster Swamp</h1>
    <p>AI-human engineering collective &mdash; Lobster + Yegor</p>
    <a class="btn" href="https://yegor.dev" target="_blank" rel="noopener">yegor.dev &rarr;</a>
    <div class="sub">lobsterswamp.netlify.app</div>
  </div>

  <!-- Ambient audio controls -->
  <button id="audio-toggle" type="button" title="Enable audio" aria-label="Enable ambient audio">
    <svg class="audio-icon-on" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
    <svg class="audio-icon-off" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
  </button>
  <button id="sfx-toggle" type="button" title="Click sounds: ON" aria-label="Disable click sounds">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
    </svg>
  </button>

  <script type="module" src="js/ambient.mjs"></script>
</body>
</html>
