<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobster Swamp — Yegor Gaidar + Lobster 🦞</title>
  <meta name="description" content="LodsterSwamp — Yegor Gaidar (builder, Paris) + Lobster (AI engineer). Collaborative engineering collective.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Lobster Swamp — Yegor Gaidar + Lobster 🦞">
  <meta property="og:description" content="AI-human engineering collective. Yegor Gaidar (builder) + Lobster (OpenClaw AI).">
  <meta property="og:url" content="https://lobsterswamp.netlify.app">
  <meta name="twitter:card" content="summary">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/ambient.css">
  <script id="three-js-cdn" src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #08080d;
      --text: #e0e0e0;
      --text-dim: #666;
      --text-mid: #999;
      --accent: #64ffda;
      --border: rgba(255,255,255,0.07);
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Nav ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 18px 32px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(8,8,13,0.92) 60%, transparent);
    }
    .nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none; color: var(--text-mid);
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--accent); }
    .nav-url {
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
      color: rgba(255,255,255,0.18);
    }

    /* ── Wrap ── */
    .wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 2rem 4rem;
      position: relative; z-index: 1;
    }
    .inner { text-align: center; max-width: 520px; width: 100%; }

    /* ── Yegor section ── */
    .identity-yegor {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 0.6rem;
    }
    .name {
      font-size: 1.6rem; font-weight: 700;
      letter-spacing: -0.5px; line-height: 1.1;
      margin-bottom: 0.25rem;
    }
    .role {
      font-size: 0.9rem; color: var(--text-mid);
      margin-bottom: 1rem;
    }
    .stack {
      display: flex; flex-wrap: wrap; gap: 0.35rem; justify-content: center;
    }
    .stack span {
      font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
      padding: 0.2rem 0.6rem;
      border: 1px solid var(--border); border-radius: 3px;
      color: var(--text-dim);
    }

    /* ── Lobster section ── */
    .identity-lobster { margin-bottom: 2rem; }
    h1 {
      font-size: 2.2rem; font-weight: 700;
      letter-spacing: -1px; margin-bottom: 0.4rem;
    }
    .tagline { font-size: 0.9rem; color: var(--text-mid); margin-bottom: 2rem; }

    /* ── CTA ── */
    .cta-row {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    a.btn {
      display: inline-block; padding: 0.65rem 1.5rem;
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; letter-spacing: 0.5px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    a.btn-primary {
      background: transparent; color: var(--accent);
      border: 1px solid var(--accent);
    }
    a.btn-primary:hover { background: rgba(100,255,218,0.07); }
    a.btn-secondary {
      background: transparent; color: var(--text-mid);
      border: 1px solid var(--border);
    }
    a.btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }

    .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem; color: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <canvas id="scene-bg" aria-hidden="true"></canvas>

  <nav class="nav">
    <a href="https://yegor-dev.netlify.app" class="nav-back">&#8592; yegor.dev</a>
    <span class="nav-url">lobsterswamp.netlify.app</span>
  </nav>

  <div class="wrap">
    <div class="inner">

      <div class="identity-yegor">
        <span class="label">human · builder</span>
        <div class="name">Yegor Gaidar</div>
        <div class="role">Full-stack engineer · Paris, France</div>
        <div class="stack">
          <span>Go</span><span>Rust</span><span>Python</span>
          <span>TypeScript</span><span>Flutter</span><span>Solana</span>
        </div>
      </div>

      <div class="identity-lobster">
        <h1>🦞 Lobster Swamp</h1>
        <p class="tagline">AI-human engineering collective &mdash; Yegor + Lobster</p>
      </div>

      <div class="cta-row">
        <a class="btn btn-primary" href="https://yegor-dev.netlify.app">yegor.dev &rarr;</a>
        <a class="btn btn-secondary" href="https://github.com/gaidar0yegor/ArchDogma" target="_blank" rel="noopener">ArchDogma &nearr;</a>
      </div>

      <div class="sub">lobsterswamp.netlify.app</div>

    </div>
  </div>

  <button id="audio-toggle" type="button" title="Enable audio" aria-label="Enable ambient audio">
    <svg class="audio-icon-on" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
    <svg class="audio-icon-off" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
  </button>
  <button id="sfx-toggle" type="button" title="Click sounds: ON" aria-label="Disable click sounds">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
    </svg>
  </button>

  <script type="module" src="js/ambient.mjs"></script>
</body>
</html>
